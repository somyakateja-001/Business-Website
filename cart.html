<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!--  NAVBAR -->
<header class="navbar">
  <h1 class="logo">UneedIndia</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#categories">Categories</a>
    <a href="review.html">Reviews</a>
    <a href="contact.html">Contact</a>

    <a href="cart.html" class="cart-icon">

<!-- 🛒 CART -->

  <div class="payment-box">

    <p class="payment-title">Pay via UPI</p>
    <p class="upi-id">palkish04@oksbi</p>

    <!-- BUTTON -->
    <button type="button" class="place-order-btn" onclick="sendWhatsAppMessage()">
      Place Order 
    </button>

    <!-- NOTE -->
    <p class="note">
      After payment, please share your details and payment screenshot on WhatsApp 💖
    </p>

  </div>
</section>

    <h2 class="footer-logo">UneedIndia</h2>

    </p>

    <div class="footer-links">
      <a href="index.html">Home</a>
